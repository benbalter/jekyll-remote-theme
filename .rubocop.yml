require: rubocop-jekyll
inherit_gem:
  rubocop-jekyll: .rubocop.yml

AllCops:
  NewCops: enable
  Exclude:
    - vendor/**/*

Metrics/BlockLength:
  inherit_mode:
    merge:
      - Exclude
  Exclude:
    - "*.gemspec"

# Test fixtures are intentionally minimal stand-ins for real gemspecs
Gemspec/RequiredRubyVersion:
  Exclude:
    - "spec/fixtures/**/*"
